<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PO Extractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f2f5;
      --surface:   #ffffff;
      --surface2:  #f7f8fa;
      --border:    #e0e3ea;
      --border2:   #c8ccd6;
      --accent:    #4f6ef7;
      --accent-h:  #3b5be0;
      --accent-dim:#eef0fd;
      --success:   #16a34a;
      --success-bg:#f0fdf4;
      --success-bd:#bbf7d0;
      --error:     #dc2626;
      --error-bg:  #fef2f2;
      --error-bd:  #fecaca;
      --text:      #1a1d2e;
      --text-2:    #4b5378;
      --text-muted:#8891b4;
      --radius:    10px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #7c5ef9);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    header h1 { font-size: 15px; font-weight: 700; color: var(--text); }
    header .sub { font-size: 11px; color: var(--text-muted); margin-left: auto; }

    /* ── Layout ──────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      min-height: 0;
      position: relative;
    }

    /* ── PDF VIEWER (NEW) ────────────────────────────────── */
    .pdf-viewer {
      width: 0;
      background: #525659;
      border-right: none;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .pdf-viewer.open {
      width: 50%;
      border-right: 1px solid var(--border);
    }
    .pdf-viewer-header {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .close-pdf-btn {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid var(--error-bd);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .close-pdf-btn:hover {
      background: var(--error);
      color: white;
    }
    .pdf-content {
      flex: 1;
      position: relative;
    }
    .pdf-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── LEFT ────────────────────────────────────────────── */
    .left {
      width: 360px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    }

    /* Hide left panel when PDF viewer is open */
    .pdf-viewer.open + .left {
      width: 0;
      border-right: none;
      opacity: 0;
      pointer-events: none;
    }

    .left-top {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Drop zone */
    .drop-zone {
      position: relative;
      border: 2px dashed var(--border2);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--surface2);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .dz-icon { font-size: 32px; margin-bottom: 8px; }
    .drop-zone p { font-size: 13px; color: var(--text-2); }
    .drop-zone p strong { color: var(--accent); }
    .drop-zone .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* File card */
    .file-card {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 13px;
    }
    .file-card.visible { display: flex; }
    .file-icon-box {
      width: 36px; height: 36px; flex-shrink: 0;
      background: linear-gradient(135deg, #ef4444, #f97316);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .file-meta { flex: 1; min-width: 0; }
    .file-name {
      font-size: 12px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-size { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 16px; padding: 2px 5px;
      border-radius: 4px; transition: color .15s, background .15s;
    }
    .remove-btn:hover { color: var(--error); background: var(--error-bg); }

    /* Buttons row */
    .btn-row { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 14px;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background .18s, transform .1s, opacity .2s, box-shadow .18s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

    .btn-preview {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text-2);
    }
    .btn-preview:hover:not(:disabled) {
      background: var(--border);
      color: var(--text);
    }
    .btn-preview.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-extract {
      background: linear-gradient(135deg, var(--accent), #7c5ef9);
      color: #fff;
      box-shadow: 0 2px 10px rgba(79,110,247,.25);
    }
    .btn-extract:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--accent-h), #6a4ce0);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(79,110,247,.35);
    }
    .btn-extract:active:not(:disabled) { transform: translateY(0); }

    /* Progress */
    .progress-wrap { display: none; flex-direction: column; gap: 6px; }
    .progress-wrap.visible { display: flex; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--text-muted);
    }
    .progress-bg {
      height: 5px; background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #7c5ef9);
      border-radius: 99px;
      width: 0%;
      transition: width .4s ease;
    }

    /* Status */
    .status-badge { display: none; align-items: center; gap: 7px; font-size: 12px; padding: 8px 11px; border-radius: 8px; font-weight: 500; }
    .status-badge.visible { display: flex; }
    .status-badge.success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-bd); }
    .status-badge.error   { background: var(--error-bg);   color: var(--error);   border: 1px solid var(--error-bd);   }

    /* ── RIGHT ───────────────────────────────────────────── */
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      min-width: 0;
    }
    .right-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .right-header .info { display: flex; align-items: center; gap: 10px; }
    .res-badge {
      font-size: 10px; font-weight: 600; padding: 3px 8px;
      border-radius: 99px;
      background: var(--border); color: var(--text-muted);
    }
    .res-badge.ready { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-bd); }

    .right-actions { display: flex; align-items: center; gap: 8px; }

    .btn-copy {
      display: none;
      align-items: center; gap: 5px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text-2); border-radius: 7px;
      padding: 6px 11px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .btn-copy.show { display: flex; }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
    .btn-copy.copied { color: var(--success); border-color: var(--success-bd); }

    .btn-cancel {
      display: none;
      align-items: center; gap: 5px;
      background: var(--error-bg); border: 1px solid var(--error-bd);
      color: var(--error); border-radius: 7px;
      padding: 6px 11px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .btn-cancel.show { display: flex; }
    .btn-cancel:hover { background: var(--error); color: #fff; border-color: var(--error); }

    /* JSON display */
    .json-container {
      flex: 1;
      overflow: auto;
      padding: 20px;
    }
    .json-placeholder {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
    }
    .json-placeholder .ph-icon { font-size: 48px; opacity: .25; }
    .json-placeholder p { font-size: 13px; max-width: 260px; line-height: 1.6; color: var(--text-muted); }
    .json-placeholder p strong { color: var(--accent); }

    pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.75;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      white-space: pre;
      overflow-x: auto;
    }

    /* JSON syntax colours (light theme) */
    .jk  { color: #3b60e0; }   /* key */
    .js  { color: #16a34a; }   /* string */
    .jn  { color: #b45309; }   /* number */
    .jb  { color: #7c3aed; }   /* boolean */
    .jnl { color: #6b7280; }   /* null */

    @media (max-width: 1100px) {
      .pdf-viewer.open { width: 60%; }
    }

    @media (max-width: 860px) {
      main { flex-direction: column; }
      .left { width: 100%; max-height: 400px; border-right: none; border-bottom: 1px solid var(--border); }
      .pdf-viewer.open { width: 100%; height: 60vh; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">📄</div>
  <h1>PO Extractor</h1>
</header>

<main>
  <!-- ══════════════ PDF VIEWER ══════════════ -->
  <section class="pdf-viewer" id="pdfViewer">
    <div class="pdf-viewer-header">
      <div class="section-label">PDF Preview</div>
      <button class="close-pdf-btn" id="closePdfBtn">✕ Close Preview</button>
    </div>
    <div class="pdf-content" id="pdfContent">
      <!-- iframe will be injected here -->
    </div>
  </section>

  <!-- ══════════════ LEFT PANEL ══════════════ -->
  <section class="left">

    <!-- Upload controls -->
    <div class="left-top">
      <div class="section-label">Upload PDF</div>

      <!-- Drop zone -->
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf" />
        <div class="dz-icon">📂</div>
        <p><strong>Click to browse</strong> or drag &amp; drop</p>
        <p class="hint">PDF files only</p>
      </div>

      <!-- File card (shown after selection) -->
      <div class="file-card" id="fileCard">
        <div class="file-icon-box">📄</div>
        <div class="file-meta">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="remove-btn" id="removeBtn" title="Remove file">✕</button>
      </div>

      <!-- Action buttons -->
      <div class="btn-row">
        <button class="btn btn-preview" id="previewBtn" disabled>
          👁 Preview
        </button>
        <button class="btn btn-extract" id="extractBtn" disabled>
          ⚡ Extract
        </button>
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label">
          <span id="progressLabel">Processing…</span>
        </div>
        <div class="progress-bg">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Status message -->
      <div class="status-badge" id="statusBadge"></div>
    </div>



  </section>

  <!-- ══════════════ RIGHT PANEL ══════════════ -->
  <section class="right">
    <div class="right-header">
      <div class="info">
        <span class="section-label">JSON Response</span>
        <span class="res-badge" id="resBadge">Waiting</span>
      </div>
      <div class="right-actions">
        <button class="btn-cancel" id="cancelBtn">✕ Cancel</button>
        <button class="btn-copy" id="copyBtn">📋 Copy</button>
      </div>
    </div>

    <div class="json-container" id="jsonContainer">
      <div class="json-placeholder">
        <div class="ph-icon">📊</div>
        <p>Upload a PDF and click <strong>Extract</strong> to see the structured purchase order data here.</p>
      </div>
    </div>
  </section>
</main>

<script>
  const API_BASE = 'http://localhost:8000';

  const fileInput     = document.getElementById('fileInput');
  const dropZone      = document.getElementById('dropZone');
  const fileCard      = document.getElementById('fileCard');
  const fileName      = document.getElementById('fileName');
  const fileSize      = document.getElementById('fileSize');
  const removeBtn     = document.getElementById('removeBtn');
  const previewBtn    = document.getElementById('previewBtn');
  const extractBtn    = document.getElementById('extractBtn');
  const progressWrap  = document.getElementById('progressWrap');
  const progressFill  = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const statusBadge   = document.getElementById('statusBadge');
  const jsonContainer   = document.getElementById('jsonContainer');
  const resBadge        = document.getElementById('resBadge');
  const copyBtn         = document.getElementById('copyBtn');
  const cancelBtn       = document.getElementById('cancelBtn');
  const pdfViewer       = document.getElementById('pdfViewer');
  const pdfContent      = document.getElementById('pdfContent');
  const closePdfBtn     = document.getElementById('closePdfBtn');

  let selectedFile  = null;
  let previewUrl    = null;
  let lastJson      = null;
  let abortCtrl     = null;   // AbortController for active fetch

  /* ── File selection ─────────────────────────────────────── */
  function onFileSelected(file) {
    if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
      showStatus('error', '⚠️ Please select a PDF file.');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatBytes(file.size);
    fileCard.classList.add('visible');
    dropZone.style.display = 'none';
    previewBtn.disabled = false;
    extractBtn.disabled = false;
    clearStatus();
    // Reset preview if a new file is chosen
    closePdfPreview();
  }

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) onFileSelected(fileInput.files[0]);
  });

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) onFileSelected(e.dataTransfer.files[0]);
  });

  removeBtn.addEventListener('click', resetFile);

  function resetFile() {
    // Revoke old object URL
    if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
    selectedFile  = null;
    fileInput.value = '';
    fileCard.classList.remove('visible');
    dropZone.style.display = '';
    previewBtn.disabled = true;
    extractBtn.disabled = true;
    clearStatus();
    closePdfPreview();
  }

  /* ── Preview PDF — open in left side pane ───────────────── */
  previewBtn.addEventListener('click', openPdfPreview);
  closePdfBtn.addEventListener('click', closePdfPreview);

  function openPdfPreview() {
    if (!selectedFile) return;
    
    // Revoke old URL if any
    if (previewUrl) URL.revokeObjectURL(previewUrl);
    
    previewUrl = URL.createObjectURL(selectedFile);
    
    // Inject iframe
    pdfContent.innerHTML = `<iframe src="${previewUrl}#toolbar=0" type="application/pdf"></iframe>`;
    
    // Open the pane
    pdfViewer.classList.add('open');
    previewBtn.classList.add('active');
  }

  function closePdfPreview() {
    pdfViewer.classList.remove('open');
    previewBtn.classList.remove('active');
    // We can clear the iframe after the transition
    setTimeout(() => {
      if (!pdfViewer.classList.contains('open')) {
        pdfContent.innerHTML = '';
      }
    }, 400);
  }

  /* ── Extract (call API) ──────────────────────────────────── */
  extractBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    // Set up AbortController so Cancel can stop the fetch
    abortCtrl = new AbortController();

    extractBtn.disabled = true;
    previewBtn.disabled = true;
    cancelBtn.classList.add('show');
    clearStatus();
    showProgress('Uploading PDF…', 15);
    copyBtn.classList.remove('show');
    resBadge.textContent = 'Processing…';
    resBadge.className   = 'res-badge';

    jsonContainer.innerHTML = `
      <div class="json-placeholder">
        <div class="ph-icon" style="animation:spin 1s linear infinite">⚙️</div>
        <p>Extracting purchase order data…</p>
      </div>`;

    const form = new FormData();
    form.append('file', selectedFile);

    try {
      showProgress('Running AI extraction…', 55);
      const res  = await fetch(`${API_BASE}/extract`, {
        method: 'POST',
        body: form,
        signal: abortCtrl.signal
      });
      showProgress('Parsing response…', 90);
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);

      lastJson = data;
      showProgress('Done', 100);
      setTimeout(() => progressWrap.classList.remove('visible'), 600);

      resBadge.textContent = `✓ ${data.pdf_type || 'Ready'}`;
      resBadge.className   = 'res-badge ready';

      renderJson(data);
      copyBtn.classList.add('show');
      showStatus('success', '✅ Extraction complete');
    } catch (err) {
      progressWrap.classList.remove('visible');
      if (err.name === 'AbortError') {
        resBadge.textContent = 'Cancelled';
        resBadge.className   = 'res-badge';
        showStatus('error', '⛔ Extraction cancelled');
        jsonContainer.innerHTML = `
          <div class="json-placeholder">
            <div class="ph-icon">⛔</div>
            <p>Extraction was cancelled.</p>
          </div>`;
      } else {
        resBadge.textContent = 'Error';
        resBadge.className   = 'res-badge';
        showStatus('error', `❌ ${err.message}`);
        jsonContainer.innerHTML = `
          <div class="json-placeholder">
            <div class="ph-icon">⚠️</div>
            <p style="color:var(--error)">${escHtml(err.message)}</p>
          </div>`;
      }
    } finally {
      abortCtrl = null;
      extractBtn.disabled = false;
      previewBtn.disabled = false;
      cancelBtn.classList.remove('show');
    }
  });

  /* ── Cancel extraction ───────────────────────────────────── */
  cancelBtn.addEventListener('click', () => {
    if (abortCtrl) abortCtrl.abort();
  });

  /* ── Copy ────────────────────────────────────────────────── */
  copyBtn.addEventListener('click', () => {
    if (!lastJson) return;
    navigator.clipboard.writeText(JSON.stringify(lastJson, null, 2)).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✔ Copied!';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = '📋 Copy';
      }, 2000);
    });
  });

  /* ── Helpers ─────────────────────────────────────────────── */
  function showProgress(label, pct) {
    progressWrap.classList.add('visible');
    progressLabel.textContent = label;
    progressFill.style.width  = pct + '%';
  }
  function showStatus(type, msg) {
    statusBadge.textContent = msg;
    statusBadge.className   = `status-badge visible ${type}`;
  }
  function clearStatus() {
    statusBadge.className = 'status-badge';
  }
  function formatBytes(b) {
    if (b < 1024)        return b + ' B';
    if (b < 1048576)     return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── JSON syntax highlight ───────────────────────────────── */
  function syntaxHighlight(obj) {
    let json = JSON.stringify(obj, null, 2)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return json.replace(
      /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+\.?\d*(?:[eE][+\-]?\d+)?)/g,
      m => {
        if (/^"/.test(m)) return /:$/.test(m) ? `<span class="jk">${m}</span>` : `<span class="js">${m}</span>`;
        if (/true|false/.test(m)) return `<span class="jb">${m}</span>`;
        if (/null/.test(m))       return `<span class="jnl">${m}</span>`;
        return `<span class="jn">${m}</span>`;
      }
    );
  }

  function renderJson(data) {
    jsonContainer.innerHTML = `<pre>${syntaxHighlight(data)}</pre>`;
  }

  // CSS spin animation
  const s = document.createElement('style');
  s.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(s);
</script>
</body>
</html>
